{% extends "layout.html" %}

{% block body %}
<br>
<div class="container text-center">
    <div class="row justify-content-md-center">
        <div class="col-md-auto"><h2>Enter your favourite Pokemon</h2></div>
    </div>
    <ul>
    <form method="post" action="/insert" enctype="multipart/form-data">
        <div class="row justify-content-md-center">
            <div class="col-md-auto"> Name </div>
        </div>
        <input type="text" name="name" id="name" required>
        <br><br>


        <div class="row justify-content-md-center">
            <div class="col-md-auto"> Type (Max 2) </div>
        </div>
        <select name="type" id="type" multiple size="18" required>
            <option class="multiselect" value="Normal">Normal</option>
            <option class="multiselect" value="Fire">Fire</option>
            <option class="multiselect" value="Water">Water</option>
            <option class="multiselect" value="Electric">Electric</option>
            <option class="multiselect" value="Grass">Grass</option>
            <option class="multiselect" value="Ice">Ice</option>
            <option class="multiselect" value="Fighting">Fighting</option>
            <option class="multiselect" value="Poison">Poison</option>
            <option class="multiselect" value="Ground">Ground</option>
            <option class="multiselect" value="Flying">Flying</option>
            <option class="multiselect" value="Psychic">Psychic</option>
            <option class="multiselect" value="Bug">Bug</option>
            <option class="multiselect" value="Rock">Rock</option>
            <option class="multiselect" value="Ghost">Ghost</option>
            <option class="multiselect" value="Dragon">Dragon</option>
            <option class="multiselect" value="Dark">Dark</option>
            <option class="multiselect" value="Steel">Steel</option>
            <option class="multiselect" value="Fairy">Fairy</option>
        </select>
        <br><br>

        <div class="row justify-content-md-center">
            <div class="col-md-auto"> Ability </div>
        </div>
        <input type="text" name="ability" id="ability" required>
        <br><br>


        <div class="row justify-content-md-center">
            <div class="col-md-auto"> Release Generation </div>
        </div>
        <input type="text" name="generation" id="generation" required>
        <br><br>


        <input type="file" name="img" required>
        <br><br>


        <input type="submit" value="Submit">
    </form>
    </ul>
</div>
{% endblock %}
