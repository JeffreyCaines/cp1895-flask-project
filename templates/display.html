{% extends "layout.html" %}

{% block body %}
<br>
<div class="container text-center">
    <div class="row justify-content-md-center">
        <div class="col-md-auto"><h2>List of all Favourite Pokemon</h2></div>
    </div>
    <ul>
        {% for name, pokemon in pokemon.items() %}
            <span><h5>{{ name }}:</h5></span>
            {% for key, value in pokemon.items() %}
                {% if key == 'img' %}
                    <image src="{{file_location}}/{{value}}"></image>
                {% else %}
                    <span>{{key}}: {{value}}</span>
                    <br>
                {% endif %}
             {% endfor %}
            <br>
            <br>
        {% endfor %}
    </ul>
</div>
{% endblock %}
