{% extends "layout.html" %}

{% block body %}

<h1>Display Games</h1>
<ul>
    {% for name, game in games.items() %}
        <li>{{name}}<br>
        {% for key, value in game.items() %}
            {% if key == "img" %}
                <img src="{{file_path}}{{value}}"></img>
            {% else %}
                <span>{{key}}: {{value}}</span>
                <br>
            {% endif %}
        {% endfor %}
        </li>
    {% endfor %}
</ul>

{% endblock %}
